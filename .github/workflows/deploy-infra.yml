name: infra-deploy
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare remote directories
        uses: appleboy/ssh-action@v1.0.3
        env:
          INFRA_DEPLOY_PATH: ${{ secrets.INFRA_DEPLOY_PATH }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: INFRA_DEPLOY_PATH
          script: |
            set -e
            if [ -z "$INFRA_DEPLOY_PATH" ]; then
              echo "ERROR: INFRA_DEPLOY_PATH is empty"
              exit 1
            fi
            sudo mkdir -p "$INFRA_DEPLOY_PATH/deploy" \
                         "$INFRA_DEPLOY_PATH/nginx/conf.d" \
                         "$INFRA_DEPLOY_PATH/static" \
                         "$INFRA_DEPLOY_PATH/letsencrypt" \
                         "$INFRA_DEPLOY_PATH/cert" \
                         "$INFRA_DEPLOY_PATH/uploads" \
                         "$INFRA_DEPLOY_PATH/data/mongo" \
                         "$INFRA_DEPLOY_PATH/data/redis" || mkdir -p "$INFRA_DEPLOY_PATH/deploy" "$INFRA_DEPLOY_PATH/nginx/conf.d" "$INFRA_DEPLOY_PATH/static" "$INFRA_DEPLOY_PATH/data/mongo" "$INFRA_DEPLOY_PATH/data/redis"
            # 清理错误的目录结构（若存在）
            if [ -d "$INFRA_DEPLOY_PATH/nginx/nginx.conf" ]; then
              echo "Removing wrong directory: $INFRA_DEPLOY_PATH/nginx/nginx.conf"
              sudo rm -rf "$INFRA_DEPLOY_PATH/nginx/nginx.conf" || rm -rf "$INFRA_DEPLOY_PATH/nginx/nginx.conf"
            fi
            if [ -d "$INFRA_DEPLOY_PATH/nginx/nginx" ]; then
              echo "Removing wrong directory: $INFRA_DEPLOY_PATH/nginx/nginx"
              sudo rm -rf "$INFRA_DEPLOY_PATH/nginx/nginx" || rm -rf "$INFRA_DEPLOY_PATH/nginx/nginx"
            fi
            sudo chown $(id -un):$(id -gn) -R "$INFRA_DEPLOY_PATH" || true
      - name: Upload infra compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "deploy/docker-compose.yml"
          target: ${{ secrets.INFRA_DEPLOY_PATH }}
          overwrite: true
      - name: Upload Nginx directory (conf + conf.d)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "nginx/*"
          target: ${{ secrets.INFRA_DEPLOY_PATH }}
          overwrite: true
      - name: Deploy infra over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          INFRA_DEPLOY_PATH: ${{ secrets.INFRA_DEPLOY_PATH }}
          INFRA_NETWORK_NAME: ${{ secrets.INFRA_NETWORK_NAME != '' && secrets.INFRA_NETWORK_NAME || vars.INFRA_NETWORK_NAME }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: INFRA_DEPLOY_PATH,INFRA_NETWORK_NAME
          script: |
            set -e
            mkdir -p "$INFRA_DEPLOY_PATH/nginx/conf.d" "$INFRA_DEPLOY_PATH/static" "$INFRA_DEPLOY_PATH/data/mongo" "$INFRA_DEPLOY_PATH/data/redis"
            # 修复如果曾经因为未上传文件而导致 Docker 创建了同名目录的情况
            if [ -d "$INFRA_DEPLOY_PATH/nginx/nginx.conf" ]; then
              echo "Found directory at $INFRA_DEPLOY_PATH/nginx/nginx.conf; removing and expecting file upload"
              sudo rm -rf "$INFRA_DEPLOY_PATH/nginx/nginx.conf" || rm -rf "$INFRA_DEPLOY_PATH/nginx/nginx.conf"
            fi
            if [ -d "$INFRA_DEPLOY_PATH/nginx/nginx" ]; then
              echo "Found nested directory at $INFRA_DEPLOY_PATH/nginx/nginx; removing"
              sudo rm -rf "$INFRA_DEPLOY_PATH/nginx/nginx" || rm -rf "$INFRA_DEPLOY_PATH/nginx/nginx"
            fi
            if [ ! -f "$INFRA_DEPLOY_PATH/nginx/nginx.conf" ]; then
              echo "WARNING: nginx.conf not found at $INFRA_DEPLOY_PATH/nginx/nginx.conf"
              echo "You must upload nginx/nginx.conf before compose up to avoid mount errors."
            fi
            cd "$INFRA_DEPLOY_PATH/deploy"
            NET="${INFRA_NETWORK_NAME:-apps}"
            docker network ls --format "{{.Name}}" | grep -Fx "$NET" || docker network create "$NET"
            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d
            docker ps
            docker exec gateway nginx -t || true
            docker exec gateway nginx -s reload || true
